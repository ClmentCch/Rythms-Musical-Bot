services:
  - type: worker
    name: rythms-musical-bot
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: node ./dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 18.18.2
      - key: TOKEN
        sync: false
      - key: BOT_NAME
        value: Rythm's Musical Bot
      - key: MAX_PLAYLIST_SIZE
        value: 10
      - key: PRUNING
        value: false
      - key: LOCALE
        value: fr
      - key: STAY_TIME
        value: 30
      - key: DEFAULT_VOLUME
        value: 100
